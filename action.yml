name: 'Release to GitHub'
description: 'Create GitHub release with semantic versioning and automatic maintenance branches'

inputs:
  version:
    description: 'Specific version to release (e.g., 1.2.3). If not provided, auto-detects from conventional commits'
    required: false
    default: ''

  release-name:
    description: 'Override release name (default: "Release vX.Y.Z")'
    required: false
    default: ''

  body:
    description: 'Release notes body (overrides auto-generated changelog)'
    required: false
    default: ''

  files:
    description: 'Newline-delimited glob patterns of release artifacts to upload'
    required: false
    default: ''

  draft:
    description: 'Create as draft release'
    required: false
    default: 'false'

  prerelease:
    description: 'Mark as prerelease'
    required: false
    default: 'false'

  create-maintenance-branch:
    description: 'Create release/X.x branch on major releases for maintenance'
    required: false
    default: 'true'

  skip-release-types:
    description: 'Comma-separated conventional commit types that should skip the release (e.g., "docs,chore,style")'
    required: false
    default: ''

  github-token:
    description: 'GitHub token with write permissions'
    required: true

outputs:
  version:
    description: 'Released version (e.g., 1.2.3)'
    value: ${{ steps.tag.outputs.new_version }}

  tag:
    description: 'Created git tag (e.g., v1.2.3)'
    value: ${{ steps.tag.outputs.new_tag }}

  release-url:
    description: 'URL to the created GitHub release'
    value: ${{ steps.release.outputs.url }}

  release-id:
    description: 'ID of the created GitHub release'
    value: ${{ steps.release.outputs.id }}

  release-type:
    description: 'Release type: major, minor, patch, or custom'
    value: ${{ steps.tag.outputs.release_type }}

  changelog:
    description: 'Auto-generated changelog from conventional commits'
    value: ${{ steps.tag.outputs.changelog }}

  maintenance-branch:
    description: 'Created maintenance branch (e.g., release/1.x), empty if not created'
    value: ${{ steps.branch.outputs.branch }}

  major-tag:
    description: 'Updated floating major tag (e.g., v1)'
    value: ${{ steps.major-tag.outputs.major-tag }}

  skipped:
    description: 'Whether the release was skipped due to commit type'
    value: ${{ steps.skip-check.outputs.skip_release }}

runs:
  using: composite
  steps:
    - name: Check if release should be skipped
      id: skip-check
      shell: bash
      run: |
        SKIP_TYPES="${{ inputs.skip-release-types }}"
        if [ -z "$SKIP_TYPES" ]; then
          echo "skip_release=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        COMMIT_MSG=$(git log -1 --pretty=%B)
        COMMIT_TYPE=$(echo "$COMMIT_MSG" | grep -oE '^[a-z]+:' | sed 's/://')

        if [ -z "$COMMIT_TYPE" ]; then
          echo "skip_release=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        IFS=',' read -ra TYPES_ARRAY <<< "$SKIP_TYPES"
        for TYPE in "${TYPES_ARRAY[@]}"; do
          TYPE=$(echo "$TYPE" | xargs)
          if [ "$COMMIT_TYPE" = "$TYPE" ]; then
            echo "Commit type '$COMMIT_TYPE' matches skip type '$TYPE', skipping release"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

        echo "skip_release=false" >> "$GITHUB_OUTPUT"

    - name: Create version tag
      id: tag
      if: steps.skip-check.outputs.skip_release != 'true'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ inputs.github-token }}
        custom_tag: ${{ inputs.version }}
        create_annotated_tag: 'true'

    - name: Create GitHub release
      id: release
      if: steps.skip-check.outputs.skip_release != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ inputs.release-name || format('Release {0}', steps.tag.outputs.new_tag) }}
        body: ${{ inputs.body || steps.tag.outputs.changelog }}
        files: ${{ inputs.files }}
        draft: ${{ inputs.draft == 'true' }}
        prerelease: ${{ inputs.prerelease == 'true' }}
        token: ${{ inputs.github-token }}

    - name: Update floating major tag
      id: major-tag
      if: steps.skip-check.outputs.skip_release != 'true'
      shell: bash
      run: |
        VERSION="${{ steps.tag.outputs.new_version }}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MAJOR_TAG="v$MAJOR"
        NEW_TAG="${{ steps.tag.outputs.new_tag }}"

        git fetch --tags
        git tag -f "$MAJOR_TAG" "$NEW_TAG"
        git push origin "$MAJOR_TAG" --force

        echo "major-tag=$MAJOR_TAG" >> "$GITHUB_OUTPUT"
        echo "Updated floating tag: $MAJOR_TAG -> $NEW_TAG"

    - name: Create maintenance branch
      id: branch
      if: steps.skip-check.outputs.skip_release != 'true' && inputs.create-maintenance-branch == 'true'
      shell: bash
      run: |
        VERSION="${{ steps.tag.outputs.new_version }}"
        RELEASE_TYPE="${{ steps.tag.outputs.release_type }}"

        if [ "$RELEASE_TYPE" != "major" ]; then
          echo "Not a major release ($RELEASE_TYPE), skipping maintenance branch"
          echo "branch=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        PREV_MAJOR=$((MAJOR - 1))
        PREV_MAJOR_TAG="v$PREV_MAJOR"

        if ! git rev-parse "$PREV_MAJOR_TAG" >/dev/null 2>&1; then
          echo "No previous major tag ($PREV_MAJOR_TAG) found"
          echo "branch=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        BRANCH_NAME="release/${PREV_MAJOR}.x"

        if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME" 2>/dev/null || \
           git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME" 2>/dev/null; then
          echo "Branch $BRANCH_NAME already exists"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git checkout -b "$BRANCH_NAME" "$PREV_MAJOR_TAG"
        git push origin "$BRANCH_NAME"

        echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
        echo "Created maintenance branch: $BRANCH_NAME from $PREV_MAJOR_TAG"
