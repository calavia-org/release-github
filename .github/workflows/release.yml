name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release to GitHub
        uses: calavia-org/release-github@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
